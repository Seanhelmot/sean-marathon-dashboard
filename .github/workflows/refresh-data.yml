name: Refresh Garmin data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  pull:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install garth

      - name: Pull Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_SESSION_TOKEN: ${{ secrets.GARMIN_SESSION_TOKEN }}
        run: python scripts/pull_garmin.py

      - name: Commit and push live.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          if git diff --staged --quiet; then
            echo "No changes to live.json — skipping commit."
          else
            git commit -m "chore: refresh live data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
