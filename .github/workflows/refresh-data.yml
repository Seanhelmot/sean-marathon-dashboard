name: Refresh training data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

jobs:
  pull:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests garminconnect

      - name: Pull training data
        env:
          INTERVALS_API_KEY:    ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          GARMIN_EMAIL:         ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:      ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_SESSION_TOKEN: ${{ secrets.GARMIN_SESSION_TOKEN }}
        run: |
          if [ -n "$INTERVALS_API_KEY" ]; then
            echo "Using intervals.icu source"
            python scripts/pull_intervals.py
          else
            echo "Using Garmin Connect source"
            python scripts/pull_garmin.py
          fi

      - name: Commit and push live.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          if git diff --staged --quiet; then
            echo "No changes to live.json — skipping commit."
          else
            git commit -m "chore: refresh live data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
