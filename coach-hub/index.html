<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:    #060b12; --panel:  #0d1520; --raised: #141f2e; --line:   #1e2d40;
    --slate:  #6b8299; --paper:  #d6e4f0; --signal: #00d4ff;
    --good:   #22c55e; --warn:   #f59e0b; --bad:    #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--ink); color: var(--paper); font-family: 'Inter', sans-serif; min-height: 100vh; }

  header {
    background: var(--panel); border-bottom: 1px solid var(--line);
    padding: 14px 32px; display: flex; align-items: center; gap: 20px;
  }
  header h1 { font-family: 'Big Shoulders Display', sans-serif; font-size: 22px; font-weight: 800; color: var(--signal); letter-spacing: .04em; }
  header .sub { font-size: 11px; color: var(--slate); flex: 1; font-family: 'IBM Plex Mono', monospace; }
  .refresh-btn { font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--signal); border: 1px solid var(--signal); background: transparent; padding: 3px 9px; border-radius: 3px; cursor: pointer; }
  .refresh-btn:hover { background: rgba(0,212,255,.08); }

  .roster { padding: 16px 28px 32px; display: flex; flex-direction: column; gap: 0; }

  /* ── Athlete panel ── */
  .a-panel {
    border-bottom: 1px solid var(--line);
  }
  .a-panel:last-child { border-bottom: none; }

  /* Commentary strip */
  .a-commentary {
    padding: 10px 16px 0;
    font-size: 12px; line-height: 1.4;
    font-style: italic;
  }
  .a-commentary.ready    { color: #86efac; }
  .a-commentary.moderate { color: #cbd5e1; }
  .a-commentary.recover  { color: #fcd34d; }

  /* Main row */
  .a-row {
    display: flex; align-items: center; gap: 0;
    padding: 10px 16px 12px;
    cursor: pointer;
  }
  .a-row:hover { background: rgba(13,21,32,.6); }

  /* Name block */
  .a-name-block { min-width: 200px; }
  .a-name { font-family: 'Big Shoulders Display', sans-serif; font-size: 18px; font-weight: 700; color: var(--paper); }
  .a-race { font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--slate); margin-top: 2px; }
  .a-race .days { color: var(--signal); }

  /* Divider line between name and metrics */
  .a-divider { width: 1px; height: 32px; background: var(--line); margin: 0 20px; flex-shrink: 0; }

  /* Metrics strip */
  .a-metrics { display: flex; gap: 8px; align-items: center; flex: 1; flex-wrap: wrap; }

  .chip {
    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px;
    padding: 3px 8px; border-radius: 3px; border: 1px solid; white-space: nowrap;
  }
  .ch-green  { color: var(--good);   border-color: rgba(34,197,94,.5);   background: rgba(34,197,94,.08); }
  .ch-amber  { color: var(--warn);   border-color: rgba(245,158,11,.5);  background: rgba(245,158,11,.08); }
  .ch-red    { color: var(--bad);    border-color: rgba(239,68,68,.5);   background: rgba(239,68,68,.08); }
  .ch-cyan   { color: var(--signal); border-color: rgba(0,212,255,.35);  background: rgba(0,212,255,.06); }
  .ch-slate  { color: var(--slate);  border-color: var(--line); }

  /* Flags block */
  .a-flags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-left: 20px; }

  .flag-chip {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    padding: 3px 8px; border-radius: 3px; border: 1px solid; white-space: nowrap;
  }
  .fc-red   { color: var(--bad);  border-color: rgba(239,68,68,.6);  background: rgba(239,68,68,.12); }
  .fc-warn  { color: var(--warn); border-color: rgba(245,158,11,.6); background: rgba(245,158,11,.12); }
  .fc-info  { color: var(--slate); border-color: var(--line); }
  .fc-ok    { color: #4ade80; font-size: 10px; font-family: 'IBM Plex Mono', monospace; }

  /* Expand toggle */
  .a-toggle { margin-left: 14px; font-size: 10px; color: var(--slate); font-family: 'IBM Plex Mono', monospace; flex-shrink: 0; }

  /* Red-flagged panel gets left border */
  .a-panel.flag-red  { border-left: 3px solid var(--bad); }
  .a-panel.flag-warn { border-left: 3px solid var(--warn); }

  /* ── Expand detail ── */
  .a-detail { display: none; border-top: 1px solid var(--line); }
  .a-detail.open { display: block; }
  .a-detail-inner {
    padding: 14px 18px 18px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
  }
  @media (max-width: 700px) { .a-detail-inner { grid-template-columns: 1fr; } }

  .det-head { font-size: 9px; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: .1em; color: var(--signal); margin-bottom: 8px; }

  .act-row { padding: 7px 0; border-bottom: 1px solid rgba(30,45,64,.7); }
  .act-row:last-child { border-bottom: none; }
  .act-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1px; }
  .act-name { font-size: 11.5px; font-weight: 600; color: var(--paper); }
  .act-date { font-size: 10px; color: var(--slate); font-family: 'IBM Plex Mono', monospace; }
  .act-stats { font-size: 10px; color: var(--slate); font-family: 'IBM Plex Mono', monospace; }

  .up-row { padding: 5px 0; border-bottom: 1px solid rgba(30,45,64,.7); }
  .up-row:last-child { border-bottom: none; }
  .up-name { font-size: 11px; color: var(--paper); font-weight: 500; }
  .up-meta { font-size: 10px; color: var(--slate); font-family: 'IBM Plex Mono', monospace; margin-top: 1px; }

  .fit-tiles { display: flex; gap: 8px; margin-top: 12px; }
  .fit-tile { background: var(--raised); border: 1px solid var(--line); border-radius: 3px; padding: 6px 12px; text-align: center; }
  .fit-tile .fv { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: var(--paper); }
  .fit-tile .fl { font-size: 8px; color: var(--slate); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

  footer { text-align: center; padding: 20px; font-size: 10px; color: var(--slate); font-family: 'IBM Plex Mono', monospace; border-top: 1px solid var(--line); }
</style>
</head>
<body>

<header>
  <h1>COACH HUB</h1>
  <div class="sub" id="hub-sub">Loading…</div>
  <button class="refresh-btn" onclick="init()">↻ Refresh</button>
</header>

<div class="roster" id="roster">
  <div style="color:var(--slate);padding:20px 0;font-size:13px;">Loading athlete data…</div>
</div>

<footer>coach.json · refreshes 6am + 10am AEST</footer>

<script>
const COACH_JSON_URL = '../data/coach.json';
const FEEL = ['','😩','😕','😐','🙂','😄'];

function fmtDur(s) {
  if (!s) return '';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return h > 0 ? `${h}h${m}m` : `${m}m`;
}
function fmtPace(dec) {
  if (dec == null) return '—';
  const mins = Math.floor(dec);
  const secs = String(Math.round((dec%1)*100)).padStart(2,'0');
  return `${mins}:${secs}`;
}
function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/* ── 1-sentence readiness commentary ── */
function buildCommentary(a) {
  const h   = a.health  || {};
  const fit = a.fitness || {};
  const acts = a.recent_activities || [];
  const tsb  = fit.tsb;

  // Check yesterday's load
  const today = new Date(); today.setHours(0,0,0,0);
  const yday = localDateStr(new Date(today.getFullYear(), today.getMonth(), today.getDate()-1));
  const yRuns = acts.filter(x => x.date === yday);
  const yDist = yRuns.reduce((s,x) => s+(x.dist_km||0), 0);
  const yMaxHR = Math.max(0, ...yRuns.map(x => x.avg_hr||0));
  const yLong    = yDist >= 18;
  const yQuality = yMaxHR >= 150 && yDist >= 5;

  // Score
  let score = 60;
  if (tsb != null) {
    if      (tsb >  5)  score += 30;
    else if (tsb > -5)  score += 20;
    else if (tsb > -15) score += 5;
    else if (tsb > -25) score -= 10;
    else                score -= 25;
  }
  if (h.hrv_7d_avg != null) {
    if      (h.hrv_7d_avg >= 75) score += 15;
    else if (h.hrv_7d_avg >= 55) score += 5;
    else                         score -= 10;
  }
  if (h.sleep_score != null) {
    if (h.sleep_score >= 80) score += 10;
    else if (h.sleep_score < 65) score -= 10;
  }
  if (h.rhr != null && h.rhr_7d_avg != null) {
    const delta = h.rhr - h.rhr_7d_avg;
    if (delta <= -1) score += 10;
    else if (delta > 2) score -= 10;
  }
  if (yLong)    score = Math.min(score, 35);
  else if (yQuality) score = Math.min(score, 55);
  score = Math.max(0, Math.min(100, score));

  const status = score >= 70 ? 'ready' : score >= 45 ? 'moderate' : 'recover';

  // Build single sentence
  let sentence;
  const tsbStr = tsb != null ? `TSB ${tsb>0?'+':''}${tsb.toFixed(1)}` : null;
  const hrvStr = h.hrv_7d_avg != null ? `HRV ${h.hrv_7d_avg}ms` : null;

  if (yLong) {
    sentence = `Long run ${yDist.toFixed(0)}km yesterday — high load, keep today very easy.`;
  } else if (yQuality) {
    sentence = `Quality session yesterday — today should be easy${tsbStr ? ` (${tsbStr})` : ''}.`;
  } else if (score >= 70) {
    const parts = [tsbStr, hrvStr].filter(Boolean);
    sentence = `Looking fresh${parts.length ? ` — ${parts.join(', ')}` : ''}.`;
  } else if (score >= 45) {
    if (tsb != null && tsb < -8) {
      sentence = `Moderate fatigue building (${tsbStr})${hrvStr ? ` — ${hrvStr}` : ''} — respect the easy days.`;
    } else {
      const alerts = [];
      if (h.hrv_7d_avg != null && h.hrv_7d_avg < 55) alerts.push(`HRV low at ${h.hrv_7d_avg}ms`);
      if (h.sleep_score != null && h.sleep_score < 65) alerts.push(`poor sleep (${h.sleep_score})`);
      sentence = alerts.length
        ? `${alerts[0]} — monitor closely this week.`
        : `Balanced load${tsbStr ? ` (${tsbStr})` : ''} — training on track.`;
    }
  } else {
    // recover
    const alerts = [];
    if (h.hrv_7d_avg != null && h.hrv_7d_avg < 55) alerts.push(`HRV low at ${h.hrv_7d_avg}ms`);
    if (tsb != null && tsb < -15) alerts.push(`${tsbStr}`);
    if (h.rhr != null && h.rhr_7d_avg != null && (h.rhr - h.rhr_7d_avg) > 3) alerts.push(`RHR elevated`);
    sentence = alerts.length
      ? `Prioritise recovery — ${alerts.join(', ')}.`
      : `High fatigue — prioritise recovery this week.`;
  }

  return { sentence, status };
}

/* ── Flags ── */
function computeFlags(a) {
  const flags = (a.flags || []).map(f => ({ cls: f.cls||'fc-warn', text: f.text }));
  const acts = a.recent_activities || [];
  const hasGapFlag = flags.some(f => /run|gap|training/i.test(f.text));
  if (acts.length && !hasGapFlag) {
    const today = new Date(); today.setHours(0,0,0,0);
    const lastRun = new Date(acts[0].date + 'T00:00:00');
    const gap = Math.round((today - lastRun) / 86400000);
    if (gap >= 2) flags.push({ cls:'fc-info', text:`No run ${gap}d` });
  }
  return flags;
}

/* ── Build panel ── */
function buildPanel(a, idx) {
  const h   = a.health  || {};
  const fit = a.fitness || {};
  const { sentence, status } = buildCommentary(a);
  const flags = computeFlags(a);

  // Race line
  const raceParts = [];
  if (a.race) raceParts.push(a.race);
  if (a.days_to_race != null) raceParts.push(`<span class="days">${a.days_to_race}d</span>`);
  const raceLine = raceParts.join(' · ');

  // Metric chips
  const chips = [];
  const tsb = fit.tsb;
  if (tsb != null) chips.push(`<span class="chip ${tsb>5?'ch-green':tsb>-10?'ch-amber':'ch-red'}">TSB ${tsb>0?'+':''}${tsb.toFixed(1)}</span>`);
  if (h.hrv_7d_avg  != null) chips.push(`<span class="chip ${h.hrv_7d_avg>=75?'ch-green':h.hrv_7d_avg>=55?'ch-amber':'ch-red'}">HRV ${h.hrv_7d_avg}ms</span>`);
  if (h.sleep_score != null) chips.push(`<span class="chip ${h.sleep_score>=80?'ch-green':h.sleep_score>=65?'ch-amber':'ch-red'}">Sleep ${h.sleep_score}</span>`);
  if (h.rhr != null) {
    const d = h.rhr_delta != null ? h.rhr_delta : (h.rhr_7d_avg != null ? h.rhr - h.rhr_7d_avg : 0);
    chips.push(`<span class="chip ${d>3?'ch-red':d<-1?'ch-green':'ch-cyan'}">RHR ${h.rhr}${d>1?` ▲${d.toFixed(0)}`:d<-1?` ▼${Math.abs(d).toFixed(0)}`:''}</span>`);
  }
  if (fit.ctl != null) chips.push(`<span class="chip ch-slate">CTL ${fit.ctl.toFixed(0)}</span>`);
  if (fit.atl != null) chips.push(`<span class="chip ch-slate">ATL ${fit.atl.toFixed(0)}</span>`);

  // Flags HTML
  const hasBad  = flags.some(f => f.cls === 'fc-bad'  || f.cls === 'fc-red');
  const hasWarn = flags.some(f => f.cls === 'fc-warn');
  const flagsHtml = flags.length
    ? flags.map(f => `<span class="flag-chip ${f.cls}">⚠ ${f.text}</span>`).join('')
    : `<span class="fc-ok">✓ clear</span>`;

  const panelCls = hasBad ? 'a-panel flag-red' : hasWarn ? 'a-panel flag-warn' : 'a-panel';

  // Activities
  const acts = (a.recent_activities||[]).slice(0,6);
  const actRows = acts.length
    ? acts.map(act => {
        const d = new Date(act.date+'T00:00:00');
        const ds = d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
        const tokens = [
          act.dist_km  != null ? `${act.dist_km.toFixed(1)}km` : null,
          act.duration_s ? fmtDur(act.duration_s) : null,
          act.pace     != null ? `${fmtPace(act.pace)}/km` : null,
          act.avg_hr   != null ? `HR ${act.avg_hr}` : null,
          act.feel     != null ? FEEL[act.feel] : null,
        ].filter(Boolean).join(' · ');
        return `<div class="act-row">
          <div class="act-top"><span class="act-name">${act.name}</span><span class="act-date">${ds}</span></div>
          <div class="act-stats">${tokens}</div>
        </div>`;
      }).join('')
    : '<div style="color:var(--slate);font-size:11px;">No recent activities</div>';

  // Upcoming
  const upcoming = (a.upcoming||[]).slice(0,6);
  const upRows = upcoming.length
    ? upcoming.map(u => {
        const d = new Date(u.date+'T00:00:00');
        const ds = d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
        const km = u.distance_m ? ` · ${(u.distance_m/1000).toFixed(0)}km` : '';
        return `<div class="up-row"><div class="up-name">${u.name}</div><div class="up-meta">${ds}${km}</div></div>`;
      }).join('')
    : '<div style="color:var(--slate);font-size:11px;">No upcoming sessions</div>';

  const preds = a.race_predictions || {};
  const predStr = [preds['10k']?`10k ${preds['10k']}`:null, preds['marathon']?`Mara ${preds['marathon']}`:null].filter(Boolean).join(' · ');

  const div = document.createElement('div');
  div.className = panelCls;
  div.innerHTML = `
    <div class="a-commentary ${status}">${sentence}</div>
    <div class="a-row" onclick="toggleDetail(${idx})">
      <div class="a-name-block">
        <div class="a-name">${a.name}</div>
        <div class="a-race">${raceLine || '&mdash;'}</div>
      </div>
      <div class="a-divider"></div>
      <div class="a-flags">${flagsHtml}</div>
      <div class="a-divider"></div>
      <div class="a-metrics">${chips.join('')}</div>
      <div class="a-toggle" id="toggle-${idx}">▼ details</div>
    </div>
    <div class="a-detail" id="detail-${idx}">
      <div class="a-detail-inner">
        <div>
          <div class="det-head">Recent Activities</div>
          ${actRows}
        </div>
        <div>
          <div class="det-head">Upcoming Sessions</div>
          ${upRows}
          ${predStr ? `<div style="margin-top:12px;font-size:10px;color:var(--slate);font-family:'IBM Plex Mono',monospace;">Predictions: ${predStr}</div>` : ''}
          <div class="fit-tiles">
            ${fit.ctl!=null?`<div class="fit-tile"><div class="fv">${fit.ctl.toFixed(1)}</div><div class="fl">CTL</div></div>`:''}
            ${fit.atl!=null?`<div class="fit-tile"><div class="fv">${fit.atl.toFixed(1)}</div><div class="fl">ATL</div></div>`:''}
            ${tsb!=null?`<div class="fit-tile"><div class="fv">${tsb>0?'+':''}${tsb.toFixed(1)}</div><div class="fl">TSB</div></div>`:''}
          </div>
        </div>
      </div>
    </div>`;

  return { div, flagScore: hasBad ? 2 : hasWarn ? 1 : 0 };
}

function toggleDetail(idx) {
  const det = document.getElementById(`detail-${idx}`);
  const tog = document.getElementById(`toggle-${idx}`);
  const open = det.classList.toggle('open');
  tog.textContent = open ? '▲ hide' : '▼ details';
}

async function init() {
  document.getElementById('hub-sub').textContent = 'Loading…';
  document.getElementById('roster').innerHTML = '<div style="color:var(--slate);padding:20px 0;font-size:13px;">Fetching…</div>';

  let coach;
  try {
    coach = await fetch(COACH_JSON_URL, {cache:'no-store'}).then(r => {
      if (!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    });
  } catch(e) {
    document.getElementById('roster').innerHTML = `<div style="color:var(--bad);padding:20px 0;">Could not load coach.json — ${e.message}</div>`;
    return;
  }

  const athletes = coach.athletes || [];
  const panels = athletes.map((a, idx) => buildPanel(a, idx));
  panels.sort((a,b) => b.flagScore - a.flagScore);

  const roster = document.getElementById('roster');
  roster.innerHTML = '';
  panels.forEach(p => roster.appendChild(p.div));

  const totalFlags = panels.filter(p => p.flagScore > 0).length;
  const now = new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('hub-sub').textContent =
    `${athletes.length} athletes · ${now}${totalFlags ? ` · ⚠ ${totalFlags} flagged` : ' · all clear'}`;
}

init();
</script>
</body>
</html>
